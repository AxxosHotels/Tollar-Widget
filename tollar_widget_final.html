<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tollar AI Widget - Final GitHub Version</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Настройки фона (Твой скриншот по прямой ссылке) */
        .site-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('https://github.com/AxxosHotels/Tollar-Widget/blob/main/web_background.jpg?raw=true');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: flex-end; /* Виджет в нижнем правом углу */
            align-items: flex-end;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
        }

        /* Главный корень виджета */
        #tollar-widget-root {
            margin: 80px;
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* --- ПАНЕЛЬ КНОПОК (Накладывается на кольца) --- */
        #tollar-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: absolute;
            right: 180px; /* Сдвиг вправо, заходит на кольца */
            top: 50%;
            transform: translateY(-50%);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 200;
        }

        .hidden {
            opacity: 0;
            transform: translateY(-50%) translateX(40px) scale(0.7);
            pointer-events: none;
        }

        #tollar-widget-root:hover #tollar-panel {
            opacity: 1;
            transform: translateY(-50%) translateX(0) scale(1);
            pointer-events: auto;
        }

        /* Стили кнопок (увеличены на 20%) */
        .contact-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Эффект при наведении (МО) - Фон становится красным */
        .contact-btn:hover {
            background: #ff3b3b;
            border-color: #ff3b3b;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 59, 59, 0.5);
